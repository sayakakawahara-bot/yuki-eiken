<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英けんチャレンジ！</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e3f2fd;min-height:100vh;font-family:'Segoe UI','Hiragino Sans','Meiryo',sans-serif}
.app{max-width:680px;margin:0 auto;padding:12px}
.header{text-align:center;padding:1rem;background:linear-gradient(135deg,#1a6fd4,#2196f3,#42a5f5);border-radius:16px;margin-bottom:12px;color:#fff}
.header h1{font-size:20px;font-weight:500}
.lv-row{display:flex;align-items:center;gap:8px;margin:8px 12px 4px}
.lv-badge{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;font-size:13px;font-weight:500;color:#fff;white-space:nowrap}
.lv-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden}
.lv-bar-fill{height:100%;background:#ffc107;border-radius:4px;transition:width .4s}
.lv-xp{font-size:11px;color:#bbdefb;white-space:nowrap}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 12px 10px}
.stat{background:rgba(255,255,255,.15);border-radius:8px;padding:6px;text-align:center}
.stat-num{font-size:20px;font-weight:500;color:#fff}
.stat-label{font-size:10px;color:#bbdefb}
.nav{display:flex;gap:6px;margin-bottom:12px;justify-content:center;flex-wrap:wrap}
.nav-btn{padding:7px 14px;font-size:13px;border:2px solid #90caf9;border-radius:20px;background:#fff;color:#1565c0;cursor:pointer;font-weight:500;transition:all .15s}
.nav-btn.active{background:#1976d2;border-color:#1976d2;color:#fff}
.nav-btn:hover:not(.active){background:#e3f2fd}
.section{display:none}.section.active{display:block}
.card{background:#fff;border:1.5px solid #bbdefb;border-radius:14px;padding:1rem 1.25rem;margin-bottom:10px}
.btn{padding:8px 18px;font-size:14px;border:1.5px solid #90caf9;border-radius:20px;background:#fff;color:#1565c0;cursor:pointer;font-weight:500;transition:all .15s}
.btn:hover{background:#e3f2fd}
.btn-blue{background:#1976d2;border-color:#1976d2;color:#fff}
.btn-blue:hover{background:#1565c0}
.prog-bar{height:8px;background:#e3f2fd;border-radius:4px;overflow:hidden;margin:6px 0}
.prog-fill{height:100%;background:linear-gradient(90deg,#1976d2,#42a5f5);border-radius:4px;transition:width .4s}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.b-blue{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.b-green{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.b-amber{background:#fff8e1;color:#e65100;border:1px solid #ffcc80}
.b-purple{background:#ede7f6;color:#4527a0;border:1px solid #b39ddb}
.b-coral{background:#fce4ec;color:#ad1457;border:1px solid #f48fb1}
.b-teal{background:#e0f2f1;color:#00695c;border:1px solid #80cbc4}
.sentence-ctx{font-size:15px;line-height:2.1;color:#1a237e;padding:14px 16px;background:linear-gradient(135deg,#e3f2fd,#e8eaf6);border-radius:12px;border:1.5px solid #90caf9;margin:10px 0}
.blank{display:inline-block;min-width:110px;border-bottom:2.5px solid #1976d2;color:#1976d2;font-weight:500;text-align:center;padding:0 4px}
.word-choices{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.word-chip{padding:8px 18px;border:1.5px solid #90caf9;border-radius:20px;background:#fff;cursor:pointer;font-size:14px;color:#1565c0;font-weight:500;transition:all .15s}
.word-chip:hover{background:#1976d2;color:#fff}
.word-chip.correct{background:#43a047;border-color:#43a047;color:#fff;pointer-events:none}
.word-chip.wrong{background:#e53935;border-color:#e53935;color:#fff;pointer-events:none}
.word-chip.used{opacity:.4;pointer-events:none}
.feedback{padding:10px 14px;border-radius:10px;font-size:14px;margin-top:10px;display:none;font-weight:500;line-height:1.6}
.fb-ok{background:#e8f5e9;color:#2e7d32;border:1.5px solid #a5d6a7}
.fb-ng{background:#fce4ec;color:#ad1457;border:1.5px solid #f48fb1}
.task-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #e3f2fd}
.task-item:last-child{border-bottom:none}
.task-check{width:28px;height:28px;border-radius:50%;border:2px solid #90caf9;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.task-check.done{background:#1976d2;border-color:#1976d2;color:#fff}
.task-body{flex:1}
.task-label{font-size:14px;font-weight:500;color:#1a237e}
.task-sub{font-size:12px;color:#64b5f6;margin-top:2px}
.mode-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mode-tab{padding:6px 14px;font-size:13px;border:1.5px solid #90caf9;border-radius:20px;background:#fff;color:#1565c0;cursor:pointer;font-weight:500}
.mode-tab.active{background:#1976d2;border-color:#1976d2;color:#fff}
.quiz-q{font-size:15px;font-weight:500;color:#1a237e;margin-bottom:14px;padding:12px;background:#e8eaf6;border-radius:10px;border-left:4px solid #3f51b5;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:11px 16px;border:1.5px solid #90caf9;border-radius:12px;background:#fff;cursor:pointer;font-size:14px;color:#1565c0;font-weight:500;text-align:left;transition:all .15s}
.quiz-opt:hover{background:#e3f2fd;transform:translateX(3px)}
.quiz-opt.correct{background:#43a047;border-color:#43a047;color:#fff}
.quiz-opt.wrong{background:#e53935;border-color:#e53935;color:#fff}
.article-body{font-size:14px;color:#1a237e;line-height:2}
.hl{color:#1976d2;font-weight:500;border-bottom:1.5px dotted #42a5f5;cursor:pointer;position:relative}
.hl:hover{background:#e3f2fd;border-radius:3px}
.ipa{font-size:11px;color:#90a4ae;font-style:normal;font-family:'Segoe UI',sans-serif;display:block;margin-top:1px;letter-spacing:.5px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:6px}
.cal-lbl{text-align:center;font-size:11px;color:#90caf9;font-weight:500;padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500}
.cal-day.future{color:#b0bec5}
.cal-day.done{background:#1976d2;color:#fff}
.cal-day.partial{background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80}
.cal-day.missed{background:#fce4ec;color:#c62828}
.cal-day.today{border:2.5px solid #1976d2;color:#1976d2}
.cal-day.today.done{background:#1976d2;color:#fff;border:none}
.wl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #e3f2fd}
.wl-item:last-child{border-bottom:none}
.wl-item.locked{opacity:.4}
.wl-en{font-size:15px;font-weight:500;color:#1a237e}
.wl-jp{font-size:13px;color:#1976d2;font-weight:500}
.wl-ipa{font-size:11px;color:#90a4ae;display:block;margin-top:1px}
.wl-kana{font-size:11px;color:#90caf9}
input[type=text]{border:2px solid #90caf9;border-radius:20px;padding:8px 14px;font-size:15px;color:#1a237e;outline:none;font-family:inherit}
input[type=text]:focus{border-color:#1976d2}
#tip{position:fixed;background:#1565c0;color:#fff;padding:7px 14px;border-radius:12px;pointer-events:none;z-index:9999;display:none;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.25)}
#tip-meaning{font-size:14px;font-weight:500}
#tip-ipa{font-size:12px;color:#90caf9;margin-top:3px;font-family:'Segoe UI',monospace;letter-spacing:.3px}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(.4);opacity:0}70%{transform:translate(-50%,-50%) scale(1.15)}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.lv-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1976d2;color:#fff;padding:20px 28px;border-radius:20px;font-size:18px;font-weight:500;text-align:center;animation:pop .4s ease;z-index:998;pointer-events:none}
</style>
</head>
<body>
<div id="tip"><div id="tip-meaning"></div><div id="tip-ipa"></div></div>
<div class="app">

<div class="header">
  <div style="font-size:24px;margin-bottom:4px">🌍</div>
  <h1>英けんチャレンジ！</h1>
  <div class="lv-row">
    <span class="lv-badge" id="lv-label">Lv.1</span>
    <div class="lv-bar-wrap"><div class="lv-bar-fill" id="lv-bar" style="width:0%"></div></div>
    <span class="lv-xp" id="lv-xp">0/20XP</span>
  </div>
  <div class="stat-grid">
    <div class="stat"><div class="stat-num" id="s-correct">0</div><div class="stat-label">⭕ 正かい数</div></div>
    <div class="stat"><div class="stat-num" id="s-words">5</div><div class="stat-label">📚 使えるたんご</div></div>
    <div class="stat"><div class="stat-num" id="s-streak">1</div><div class="stat-label">🔥 れんぞく日</div></div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showSec('daily',this)">📅 今日</button>
  <button class="nav-btn" onclick="showSec('vocab',this)">🧩 たんご</button>
  <button class="nav-btn" onclick="showSec('know',this)">📚 知しき</button>
  <button class="nav-btn" onclick="showSec('wordlist',this)">📖 一覧</button>
  <button class="nav-btn" onclick="showSec('calsec',this)">🗓️ カレンダー</button>
</div>

<div id="daily" class="section active">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px">
      <span style="font-size:16px;font-weight:500;color:#1a237e">📅 今日のタスク</span>
      <span id="co-badge"></span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="d-prog" style="width:0%"></div></div>
    <div id="d-count" style="font-size:12px;color:#64b5f6;margin-bottom:10px"></div>
    <div id="d-tasks"></div>
  </div>
  <div id="d-game" style="display:none"><div class="card" id="d-game-inner"></div></div>
</div>

<div id="vocab" class="section">
  <div class="card" style="padding:10px 1.25rem">
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setVMode('fill',this)">✏️ あなうめ</button>
      <button class="mode-tab" onclick="setVMode('match',this)">🃏 いみあわせ</button>
      <button class="mode-tab" onclick="setVMode('spell',this)">⌨️ スペル</button>
    </div>
    <div style="font-size:12px;color:#64b5f6" id="v-info"></div>
  </div>
  <div class="card" id="v-game" style="min-height:200px"></div>
</div>

<div id="wordlist" class="section">
  <div class="card" style="padding:10px 1.25rem">
    <div style="font-size:15px;font-weight:500;color:#1a237e;margin-bottom:8px">📖 たんご一覧</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="wl-filters">
      <button class="mode-tab active" onclick="setWF('all',this)">すべて</button>
      <button class="mode-tab" onclick="setWF('unlocked',this)">使えるたんご</button>
      <button class="mode-tab" onclick="setWF('weak',this)">⚡ にがて</button>
      <button class="mode-tab" onclick="setWF('hint',this)">💡 ヒント使った</button>
    </div>
  </div>
  <div id="wl-body"></div>
</div>

<div id="know" class="section">
  <div id="know-list"></div>
  <div id="know-view" style="display:none"></div>
</div>

<div id="calsec" class="section">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button class="btn" onclick="calNav(-1)" style="padding:5px 12px">&#8249;</button>
      <span style="font-size:16px;font-weight:500;color:#1a237e" id="cal-title"></span>
      <button class="btn" onclick="calNav(1)" style="padding:5px 12px">&#8250;</button>
    </div>
    <div class="cal-grid">
      <div class="cal-lbl">月</div><div class="cal-lbl">火</div><div class="cal-lbl">水</div>
      <div class="cal-lbl">木</div><div class="cal-lbl">金</div><div class="cal-lbl">土</div><div class="cal-lbl">日</div>
    </div>
    <div class="cal-grid" id="cal-days"></div>
    <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">
      <span style="font-size:12px;color:#64b5f6;display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:#1976d2;border-radius:50%;display:inline-block"></span>かんりょう</span>
      <span style="font-size:12px;color:#64b5f6;display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:#fff3e0;border:1px solid #ffcc80;border-radius:50%;display:inline-block"></span>とちゅう</span>
      <span style="font-size:12px;color:#64b5f6;display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:#fce4ec;border-radius:50%;display:inline-block"></span>お休みした日</span>
    </div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:500;color:#1a237e;margin-bottom:8px">📊 がんばりのきろく</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
      <div style="background:#e3f2fd;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:500;color:#1976d2" id="st-days">0</div>
        <div style="font-size:11px;color:#64b5f6">学んだ日のごうけい</div>
      </div>
      <div style="background:#e8f5e9;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:500;color:#43a047" id="st-maxstreak">1</div>
        <div style="font-size:11px;color:#64b5f6">一番長いれんぞく日</div>
      </div>
    </div>
  </div>
</div>

</div>

const KA=[
 {id:"k1",title:"🌡️ Climate Change",badge:"b-coral",topic:"気こうへんどう",
  body:`Our planet is getting warmer. This is called <span class="hl" data-meaning="気こうへんどう" data-ipa="/ˈklaɪmɪt tʃeɪndʒ/">climate change</span>. Factories and cars release <span class="hl" data-meaning="はいしゅつガス" data-ipa="/ˈkɑːrbən ɪˈmɪʃnz/">carbon emissions</span> into the air. These gases trap heat from the sun, like a blanket around the Earth. As a result, ice at the North Pole is melting and sea levels are rising. <span class="hl" data-meaning="こうずい" data-ipa="/flʌdz/">Floods</span> and stronger storms are happening more often. Scientists say we must <span class="hl" data-meaning="へらす" data-ipa="/rɪˈdjuːs/">reduce</span> emissions now. Many countries are switching to <span class="hl" data-meaning="くりかえし使えるエネルギー" data-ipa="/rɪˈnjuːəbl/">renewable</span> energy such as solar and wind power.`,
  quiz:[{q:"What do carbon emissions cause?",opts:["Climate change","Earthquakes","Floods only","More wildlife"],ans:0},
        {q:"What must we reduce to slow climate change?",opts:["Forests","Emissions","Rainfall","Animals"],ans:1}]},
 {id:"k2",title:"🤖 Technology & AI",badge:"b-purple",topic:"テクノロジー・AI",
  body:`<span class="hl" data-meaning="AI（じんこうちのう）" data-ipa="/ˌeɪˈaɪ/">AI</span> (artificial intelligence) is changing our world. Computers can now recognize faces, translate languages, and even drive cars. AI also helps scientists predict natural <span class="hl" data-meaning="さいがい（じしん・たいふうなど）" data-ipa="/dɪˈzɑːstərz/">disasters</span> such as earthquakes and typhoons. However, some people worry that AI may take away jobs. It is important to use technology in a <span class="hl" data-meaning="ずっとつづけられる形で" data-ipa="/səˈsteɪnəbl/">sustainable</span> way. Countries around the world are creating new <span class="hl" data-meaning="ほうりつ" data-ipa="/ˌledʒɪˈsleɪʃn/">legislation</span> to make sure AI is used safely and fairly.`,
  quiz:[{q:"What can AI help predict?",opts:["Sports results","Disasters like earthquakes","School scores","TV schedules"],ans:1},
        {q:"What do some people worry about AI?",opts:["It uses too much water","It may take away jobs","It cannot learn","It is too expensive"],ans:1}]},
 {id:"k3",title:"🏥 Health & Medicine",badge:"b-green",topic:"けんこう・医りょう",
  body:`Staying healthy is important for everyone. Diseases can spread quickly through a <span class="hl" data-meaning="ちいきのみんな" data-ipa="/kəˈmjuːnɪti/">community</span>. Vaccines help our bodies fight viruses before we get sick. In some countries, people cannot get medicine because of <span class="hl" data-meaning="まずしさ" data-ipa="/ˈpɒvərti/">poverty</span>. The WHO (World Health Organization) works hard to <span class="hl" data-meaning="まもる" data-ipa="/prəˈtekt/">protect</span> the health of people around the world. SDG 3 is "Good Health and Well-Being." Washing your hands and eating vegetables are <span class="hl" data-meaning="大切な・大きな" data-ipa="/sɪɡˈnɪfɪkənt/">significant</span> habits that keep you healthy every day.`,
  quiz:[{q:"What does SDG 3 focus on?",opts:["Clean water","Good health and well-being","Education","Clean energy"],ans:1},
        {q:"What do vaccines help our bodies do?",opts:["Grow taller","Fight viruses","Sleep better","Run faster"],ans:1}]},
 {id:"k4",title:"🌊 Ocean & Marine Life",badge:"b-teal",topic:"海・海の生き物",
  body:`The ocean covers more than 70% of our planet. Millions of animals live there. But the ocean is in danger! Plastic <span class="hl" data-meaning="よごれ・おせん" data-ipa="/kənˌtæmɪˈneɪʃn/">contamination</span> harms sea creatures every year. Rising temperatures are killing coral reefs. The <span class="hl" data-meaning="いろいろないきもの" data-ipa="/ˌbaɪoʊdaɪˈvɜːrsɪti/">biodiversity</span> of the ocean is decreasing. SDG 14 is "Life Below Water." We can help by using less plastic and supporting ocean <span class="hl" data-meaning="まもること・ほぜん" data-ipa="/ˌkɒnsəˈveɪʃn/">conservation</span> projects around the world.`,
  quiz:[{q:"What percentage of Earth does the ocean cover?",opts:["30%","50%","70%","90%"],ans:2},
        {q:"Which SDG is about Life Below Water?",opts:["SDG 7","SDG 11","SDG 14","SDG 3"],ans:2}]},
 {id:"k5",title:"🌾 Food & Agriculture",badge:"b-amber",topic:"食べ物・農業",
  body:`About 800 million people go hungry every day. This is a very <span class="hl" data-meaning="大へんな・たいへん" data-ipa="/ˈsɪəriəs/">serious</span> problem. SDG 2 is "Zero Hunger." Farmers work hard to grow food, but climate change is making farming more difficult. Changes in <span class="hl" data-meaning="気おん・おんど" data-ipa="/ˈtemprɪtʃər/">temperature</span> and rainfall can <span class="hl" data-meaning="ひがい・そんがい" data-ipa="/ˈdæmɪdʒ/">damage</span> crops badly. Reducing food waste is also important — about one third of all food produced in the world is thrown away every year.`,
  quiz:[{q:"Which SDG is Zero Hunger?",opts:["SDG 1","SDG 2","SDG 3","SDG 4"],ans:1},
        {q:"How much food produced is wasted?",opts:["One quarter","One third","Half","Almost none"],ans:1}]},
 {id:"k6",title:"🦁 Endangered Animals",badge:"b-blue",topic:"ぜつめつきぐしゅ",
  body:`Many animals are at risk of <span class="hl" data-meaning="ぜつめつ（いなくなること）" data-ipa="/ɪkˈstɪŋkʃn/">extinction</span>. Tigers, pandas, and sea turtles are just a few examples. The biggest cause is the loss of their natural homes. When forests are cut down, animals lose their habitat. This is called <span class="hl" data-meaning="森のはかい" data-ipa="/diːˌfɒrɪˈsteɪʃn/">deforestation</span>. <span class="hl" data-meaning="おせん・よごれ" data-ipa="/pəˈluːʃn/">Pollution</span> and climate change also have a huge <span class="hl" data-meaning="えいきょう" data-ipa="/ˈɪmpækt/">impact</span> on wildlife. SDG 15 is "Life on Land." We must protect nature before it is too late.`,
  quiz:[{q:"What is the main cause of animal habitat loss?",opts:["Heavy rain","Deforestation","Cold weather","Too many animals"],ans:1},
        {q:"Which SDG is Life on Land?",opts:["SDG 10","SDG 13","SDG 15","SDG 17"],ans:2}]},
 {id:"k7",title:"🏙️ Smart Cities",badge:"b-purple",topic:"スマートシティ",
  body:`Our cities are getting smarter. A <span class="hl" data-meaning="都市の・まちの" data-ipa="/ˈɜːrbən/">urban</span> area is a place where many people live close together. Smart cities use technology to make life more <span class="hl" data-meaning="ずっとつづけられる" data-ipa="/səˈsteɪnəbl/">sustainable</span>. For example, smart traffic lights help <span class="hl" data-meaning="へらす" data-ipa="/rɪˈdjuːs/">reduce</span> car <span class="hl" data-meaning="おせん" data-ipa="/pəˈluːʃn/">pollution</span>. Buildings use solar <span class="hl" data-meaning="エネルギー" data-ipa="/ˈenərdʒi/">energy</span> to save electricity. More than half of all people in the world now live in cities — and that number is growing. Smart cities show us that technology and nature can work together for a better future.`,
  quiz:[{q:"What do smart traffic lights help reduce?",opts:["Noise","Car pollution","Water waste","Energy costs"],ans:1},
        {q:"What kind of energy do smart buildings use?",opts:["Coal energy","Nuclear energy","Solar energy","Gas energy"],ans:2}]},
 {id:"k8",title:"♻️ Plastic Pollution",badge:"b-coral",topic:"プラスチックごみ",
  body:`Every year, millions of tons of plastic enter our oceans. This <span class="hl" data-meaning="おせん" data-ipa="/pəˈluːʃn/">pollution</span> harms fish, seabirds, and other <span class="hl" data-meaning="野生動物" data-ipa="/ˈwaɪldlaɪf/">wildlife</span>. Animals can lose their natural <span class="hl" data-meaning="すみか・生息地" data-ipa="/ˈhæbɪtæt/">habitat</span> because of plastic waste. Small pieces called microplastics can even enter our food and water. The <span class="hl" data-meaning="よごれ・おせん" data-ipa="/kənˌtæmɪˈneɪʃn/">contamination</span> of the ocean is a serious <span class="hl" data-meaning="地きゅう全体の" data-ipa="/ˈɡloʊbl/">global</span> problem. We need to <span class="hl" data-meaning="リサイクルする" data-ipa="/riːˈsaɪkl/">recycle</span> more and use less single-use plastic every day.`,
  quiz:[{q:"Where does plastic pollution end up?",opts:["In forests","In the oceans","In the mountains","In the air"],ans:1},
        {q:"What are tiny pieces of plastic called?",opts:["Nanoplastics","Microplastics","Miniplastics","Smallplastics"],ans:1}]},
 {id:"k9",title:"💧 Water & Clean Energy",badge:"b-teal",topic:"水・クリーンエネルギー",
  body:`Clean water is one of the most important <span class="hl" data-meaning="しぜんのめぐみ" data-ipa="/ˈriːsɔːrs/">resources</span> on Earth. But millions of people face a water <span class="hl" data-meaning="不足・たりないこと" data-ipa="/ˈʃɔːrtɪdʒ/">shortage</span>. <span class="hl" data-meaning="かんばつ" data-ipa="/drɑːt/">Drought</span> caused by climate change is making the problem worse. At the same time, we must move away from <span class="hl" data-meaning="化石ねんりょう" data-ipa="/ˈfɒsl/">fossil</span> fuels like coal and oil. Wind, water, and solar power are <span class="hl" data-meaning="くりかえし使えるエネルギー" data-ipa="/rɪˈnjuːəbl/">renewable</span> and clean. SDG 6 is "Clean Water and Sanitation." SDG 7 is "Affordable and Clean Energy." Both are essential for a healthy planet.`,
  quiz:[{q:"What is making water shortages worse?",opts:["Too many factories","Climate change and drought","Ocean pollution","Urban growth"],ans:1},
        {q:"Which of these is a renewable energy source?",opts:["Coal","Oil","Gas","Solar power"],ans:3}]},
 {id:"k10",title:"🌪️ Disasters & Preparedness",badge:"b-amber",topic:"さいがいとそなえ",
  body:`Japan is one of the most <span class="hl" data-meaning="きずつきやすい" data-ipa="/ˈvʌlnərəbl/">vulnerable</span> countries to natural <span class="hl" data-meaning="さいがい" data-ipa="/dɪˈzɑːstər/">disasters</span>. Earthquakes can trigger <span class="hl" data-meaning="つなみ" data-ipa="/tsuːˈnɑːmi/">tsunamis</span>, fires, and building collapses. Heavy rain causes <span class="hl" data-meaning="こうずい" data-ipa="/flʌd/">floods</span> and landslides. Knowing your local <span class="hl" data-meaning="ひなん" data-ipa="/ɪˌvækjuˈeɪʃn/">evacuation</span> route and <span class="hl" data-meaning="ひなん所" data-ipa="/ˈʃeltər/">shelter</span> can save your life. Prepare an <span class="hl" data-meaning="きんきゅうじたい" data-ipa="/ɪˈmɜːrdʒənsi/">emergency</span> kit with food, water, and medicine. Practice disaster drills with your family. Being prepared BEFORE a disaster is the best way to <span class="hl" data-meaning="まもる" data-ipa="/prəˈtekt/">protect</span> everyone.`,
  quiz:[{q:"What can an earthquake trigger near the coast?",opts:["Drought","Tsunami","Pollution","Deforestation"],ans:1},
        {q:"What should you prepare at home for emergencies?",opts:["A smart TV","Emergency kit with food and water","A new bicycle","Extra clothes only"],ans:1}]},
 {id:"k11",title:"🌱 The SDGs",badge:"b-green",topic:"SDGsのめあて",
  body:`In 2015, world leaders created 17 goals called the SDGs (Sustainable Development Goals). The goal is to make the world better by 2030. SDG 1 is to end <span class="hl" data-meaning="まずしさ" data-ipa="/ˈpɒvərti/">poverty</span>. SDG 2 is zero hunger. SDG 13 is to take action on <span class="hl" data-meaning="気こうへんどう" data-ipa="/ˈklaɪmɪt tʃeɪndʒ/">climate change</span>. SDG 17 is about <span class="hl" data-meaning="きょうりょく" data-ipa="/koʊˌɒpəˈreɪʃn/">cooperation</span> between all countries. Reaching these goals needs action from every <span class="hl" data-meaning="ちいきのみんな" data-ipa="/kəˈmjuːnɪti/">community</span> in the world. Even small actions — saving electricity, reducing waste, or helping a neighbour — can have a big <span class="hl" data-meaning="えいきょう" data-ipa="/ˈɪmpækt/">impact</span>.`,
  quiz:[{q:"How many SDGs are there?",opts:["10","12","15","17"],ans:3},
        {q:"By which year should the SDGs be achieved?",opts:["2025","2030","2040","2050"],ans:1}]},
 {id:"k12",title:"🏦 Economy & Society",badge:"b-amber",topic:"けいざいと社会",
  body:`The <span class="hl" data-meaning="けいざい" data-ipa="/ɪˈkɒnəmi/">economy</span> is the system that produces and shares goods and money in a country. When the economy grows, more people have jobs and can buy things they need. However, <span class="hl" data-meaning="ふびょうどう" data-ipa="/ˌɪnɪˈkwɒlɪti/">inequality</span> means some people are much richer than others. Governments use <span class="hl" data-meaning="ほうりつ" data-ipa="/ˌledʒɪˈsleɪʃn/">legislation</span> and <span class="hl" data-meaning="福し・くらしのたすけ" data-ipa="/ˈwelfeər/">welfare</span> programmes to help people in <span class="hl" data-meaning="まずしさ" data-ipa="/ˈpɒvərti/">poverty</span>. <span class="hl" data-meaning="民主主義" data-ipa="/dɪˈmɒkrəsi/">Democracy</span> gives citizens the power to choose their leaders and demand <span class="hl" data-meaning="公正・正義" data-ipa="/ˈdʒʌstɪs/">justice</span>. A fair society also needs <span class="hl" data-meaning="多様性・いろいろあること" data-ipa="/daɪˈvɜːrsɪti/">diversity</span> — respecting people of all backgrounds, abilities, and ideas.`,
  quiz:[{q:"What does welfare help people with?",opts:["Winning elections","Buying luxury goods","Supporting people in poverty","Building roads"],ans:2},
        {q:"What does diversity mean in society?",opts:["Everyone earns the same salary","Respecting people of all backgrounds","Having only one type of government","Reducing the population"],ans:1}]},
 {id:"k13",title:"🔬 Science & Research",badge:"b-purple",topic:"かがくとけんきゅう",

// ===== ツールチップ（日本語＋発音記号） =====
const tipEl=document.getElementById('tip');
const tipM=document.getElementById('tip-meaning');
const tipI=document.getElementById('tip-ipa');

function showTip(el){
  tipM.textContent=el.dataset.meaning||'';
  tipI.textContent=el.dataset.ipa||'';
  tipEl.style.display='block';
  requestAnimationFrame(()=>{
    const r=el.getBoundingClientRect();
    const x=Math.min(window.innerWidth-tipEl.offsetWidth-8,Math.max(4,r.left+r.width/2-tipEl.offsetWidth/2));
    tipEl.style.left=x+'px';
    tipEl.style.top=Math.max(4,r.top-tipEl.offsetHeight-6)+'px';
  });
}
function hideTip(){tipEl.style.display='none';}
document.addEventListener('click',e=>{
  if(e.target.dataset.meaning){showTip(e.target);setTimeout(hideTip,2500);}
  else hideTip();
});

// ===== データ管理 =====
const SK='eiken_v5';
let D=loadD();
function loadD(){
  try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s);}catch(e){}
  return{level:1,xp:0,totalCorrect:0,maxStreak:1,streakDays:1,
         calendar:{},weakWords:[],hintWords:[],
         todayDate:null,todayVDone:0,todayVTotal:5,todaySDone:false,carryover:0};
}
function saveD(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function avail(){return W.filter(w=>w.lv<=Math.max(10,D.level));}
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}

// ===== 起動 =====
function init(){
  const today=todayStr();
  if(D.todayDate&&D.todayDate!==today){
    const done=D.todayVDone+(D.todaySDone?1:0);
    const total=D.todayVTotal+1;
    D.calendar[D.todayDate]={done,total};
    const left=D.todayVTotal-D.todayVDone;
    if(left>0)D.carryover=Math.min((D.carryover||0)+left,10);
    const yd=new Date();yd.setDate(yd.getDate()-1);
    const yStr=yd.getFullYear()+'-'+String(yd.getMonth()+1).padStart(2,'0')+'-'+String(yd.getDate()).padStart(2,'0');
    if(D.todayDate===yStr&&done>=Math.ceil(total*0.5)){D.streakDays++;D.maxStreak=Math.max(D.maxStreak,D.streakDays);}
    else if(D.todayDate!==yStr)D.streakDays=1;
  }
  if(D.todayDate!==today){D.todayDate=today;D.todayVDone=0;D.todayVTotal=5+Math.min(D.carryover||0,10);D.carryover=0;D.todaySDone=false;saveD();}
  updateHdr();renderDaily();renderKnowList();startVGame();
  calYear=new Date().getFullYear();calMonth=new Date().getMonth();
}
function updateHdr(){
  document.getElementById('lv-label').textContent='Lv.'+D.level;
  document.getElementById('lv-bar').style.width=Math.min(100,D.xp/20*100)+'%';
  document.getElementById('lv-xp').textContent=D.xp+'/20XP';
  document.getElementById('s-correct').textContent=D.totalCorrect;
  document.getElementById('s-words').textContent=avail().length+'/'+W.length;
  document.getElementById('s-streak').textContent=D.streakDays;
}
function addXP(n){
  D.xp+=n;
  if(D.xp>=20&&D.level<100){D.level++;D.xp-=20;showLvUp(D.level);}
  saveD();updateHdr();
}
function showLvUp(lv){
  const p=document.createElement('div');p.className='lv-popup';
  const nw=W.find(w=>w.lv===lv);
  p.innerHTML='⭐ Lv.'+lv+' アップ！'+(nw?'<br><span style="font-size:14px">「'+nw.w+'」が使えるようになった！</span>':'');
  document.body.appendChild(p);setTimeout(()=>p.remove(),2200);
}
let hintUsed=false;
function useHint(word){
  hintUsed=true;
  document.getElementById('hint-body').style.display='block';
  document.querySelector('#hint-wrap button').style.display='none';
  if(!D.hintWords)D.hintWords=[];
  if(!D.hintWords.includes(word))D.hintWords.push(word);
  saveD();
}
function hintBlock(q){
  return '<div style="margin-bottom:10px" id="hint-wrap">'+
    '<button class="btn" style="padding:5px 14px;font-size:12px" onclick="useHint(\''+q.w+'\')">💡 ヒントを見る</button>'+
    '<div id="hint-body" style="display:none;font-size:13px;color:#1976d2;font-weight:500;margin-top:6px">💡 '+q.w[0]+' '+Array(q.w.length-1).fill('_').join(' ')+'</div>'+
  '</div>';
}

// ===== 今日のタスク =====
let dQueue=[],dIdx=0;
function renderDaily(){
  const done=D.todayVDone+(D.todaySDone?1:0);
  const total=D.todayVTotal+1;
  document.getElementById('d-prog').style.width=Math.round(done/total*100)+'%';
  document.getElementById('d-count').textContent=done+' / '+total+' タスクおわった';
  const co=document.getElementById('co-badge');
  if(D.todayVTotal>5)co.innerHTML='<span style="background:#fff8e1;color:#e65100;border:1px solid #ffcc80;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:500">きのうの分 +'+(D.todayVTotal-5)+'問</span>';
  else co.innerHTML='';
  const vR=D.todayVTotal-D.todayVDone;
  document.getElementById('d-tasks').innerHTML=`
    <div class="task-item">
      <div class="task-check ${vR<=0?'done':''}">${vR<=0?'&#10003;':''}</div>
      <div class="task-body">
        <div class="task-label">🧩 たんごクイズ ${D.todayVDone}/${D.todayVTotal}問</div>
        <div class="task-sub">${D.weakWords.length>0?'⚡ にがてたんご '+D.weakWords.length+'個あり':'今日もがんばろう！'}</div>
      </div>
      ${vR>0?'<button class="btn btn-blue" style="padding:6px 14px;font-size:12px" onclick="startDV()">はじめる</button>':''}
    </div>
    <div class="task-item">
      <div class="task-check ${D.todaySDone?'done':''}">${D.todaySDone?'&#10003;':''}</div>
      <div class="task-body">
        <div class="task-label">📚 知しき記事を1つ読む</div>
        <div class="task-sub">どれかひとつ読んでクイズをやろう！</div>
      </div>
      ${!D.todaySDone?'<button class="btn btn-blue" style="padding:6px 14px;font-size:12px" onclick="goKnow()">読む</button>':''}
    </div>
    ${done>=total?`<div style="text-align:center;padding:1rem;background:#e8f5e9;border-radius:12px;margin-top:8px">
      <div style="font-size:32px;margin-bottom:4px">🏆</div>
      <div style="font-size:16px;font-weight:500;color:#2e7d32">今日のタスクかんりょう！すごい！</div>
      <div style="font-size:13px;color:#66bb6a;margin-top:2px">+10XP ボーナス！</div></div>`:''}
  `;
  if(done>=total&&!D['bonus'+D.todayDate]){D['bonus'+D.todayDate]=true;addXP(10);saveD();}
}
function goKnow(){showSec('know',document.querySelectorAll('.nav-btn')[2]);}
function startDV(){
  const pool=avail();
  if(!D.hintWords)D.hintWords=[];
  const weak=pool.filter(w=>D.weakWords.includes(w.w));
  const hint=pool.filter(w=>D.hintWords.includes(w.w)&&!D.weakWords.includes(w.w));
  const normal=pool.filter(w=>!D.weakWords.includes(w.w)&&!D.hintWords.includes(w.w));
  const remain=D.todayVTotal-D.todayVDone;
  dQueue=shuffle([...weak,...hint,...shuffle(normal)]).slice(0,remain);
  if(!dQueue.length)dQueue=shuffle(pool).slice(0,remain);
  dIdx=0;
  document.getElementById('d-game').style.display='block';
  renderDQ();
  document.getElementById('d-game').scrollIntoView({behavior:'smooth'});
}
function renderDQ(){
  const ga=document.getElementById('d-game-inner');
  if(dIdx>=dQueue.length||D.todayVDone>=D.todayVTotal){
    ga.innerHTML='<div style="text-align:center;padding:1.5rem"><div style="font-size:36px;margin-bottom:8px">✅</div><div style="font-size:16px;font-weight:500;color:#2e7d32">今日のたんごクイズおわり！</div></div>';
    document.getElementById('d-game').style.display='none';renderDaily();return;
  }
  const q=dQueue[dIdx];
  const isWeak=D.weakWords.includes(q.w);
  const isHint=(D.hintWords||[]).includes(q.w)&&!isWeak;
  hintUsed=false;
  const choices=makeChoices(q);
  const parts=q.ex.split('___');
  ga.innerHTML=
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">'+
      '<span class="badge b-blue">📅 今日の問題</span>'+
      (isWeak?'<span class="badge b-coral">⚡ にがてたんご</span>':'')+
      (isHint?'<span class="badge b-amber">💡 ヒント使ったたんご</span>':'')+
      '<span style="margin-left:auto;font-size:12px;color:#64b5f6">'+(D.todayVDone+dIdx+1)+'/'+D.todayVTotal+'</span>'+
    '</div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+Math.round((D.todayVDone+dIdx)/D.todayVTotal*100)+'%"></div></div>'+
    '<div class="sentence-ctx">'+parts[0]+'<span class="blank" id="dblank">＿＿＿</span>'+(parts[1]||'')+'</div>'+
    hintBlock(q)+
    '<div class="word-choices">'+choices.map(c=>'<button class="word-chip" onclick="ansD(\''+c+'\',\''+q.w+'\')">'+c+'</button>').join('')+'</div>'+
    '<div class="feedback" id="dfb"></div>';
}
function ansD(chosen,correct){
  document.querySelectorAll('#d-game-inner .word-chip').forEach(ch=>{
    if(ch.textContent===chosen)ch.classList.add(chosen===correct?'correct':'wrong');
    if(chosen!==correct&&ch.textContent===correct)ch.classList.add('correct');
    ch.classList.add('used');
  });
  document.getElementById('dblank').textContent=correct;
  const fb=document.getElementById('dfb');fb.style.display='block';
  if(!D.hintWords)D.hintWords=[];
  if(chosen===correct){
    fb.className='feedback fb-ok';fb.innerHTML='✅ 正かい！「'+correct+'」= '+dQueue[dIdx].m+(hintUsed?' 💡':'');
    D.totalCorrect++;addXP(hintUsed?2:3);D.weakWords=D.weakWords.filter(w=>w!==correct);
    if(!hintUsed)D.hintWords=D.hintWords.filter(w=>w!==correct);
    D.todayVDone++;saveD();
  }else{
    fb.className='feedback fb-ng';fb.innerHTML='❌ 正かいは「'+correct+'」だよ！またれんしゅうしよう。';
    if(!D.weakWords.includes(correct))D.weakWords.push(correct);
    D.hintWords=D.hintWords.filter(w=>w!==correct);saveD();
  }
  setTimeout(()=>{dIdx++;renderDQ();},1800);
}
function makeChoices(q){
  const pool=avail().filter(w=>w.w!==q.w);
  const base=pool.length>=3?pool:W.filter(w=>w.w!==q.w);
  return shuffle([q.w,...shuffle(base).slice(0,3).map(w=>w.w)]);
}

// ===== たんごゲーム =====
let vMode='fill',vFillOrder=[],vFillIdx=0,vSpellPool=[],vSpellIdx=0;
function setVMode(m,btn){
  vMode=m;document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  if(m==='fill')startVFill();else if(m==='match')startVMatch();else startVSpell();
}
function startVGame(){document.getElementById('v-info').textContent='使えるたんご: '+avail().length+'語 / 50語（Lv.'+D.level+'）';startVFill();}
function startVFill(){
  if(!D.hintWords)D.hintWords=[];
  const pool=avail();
  const weak=pool.filter(w=>D.weakWords.includes(w.w));
  const hint=pool.filter(w=>D.hintWords.includes(w.w)&&!D.weakWords.includes(w.w));
  const normal=pool.filter(w=>!D.weakWords.includes(w.w)&&!D.hintWords.includes(w.w));
  vFillOrder=[...weak,...hint,...shuffle(normal)];

function renderVFill(){

    ga.innerHTML='<div style="text-align:center;padding:2rem"><div style="font-size:48px">🏆</div><div style="font-size:18px;font-weight:500;color:#1a237e;margin:8px 0">全問クリア！</div><button class="btn btn-blue" onclick="startVFill()">もう一度</button></div>';return;
  }
  const q=vFillOrder[vFillIdx];
  const isWeak=D.weakWords.includes(q.w);
  const isHint=(D.hintWords||[]).includes(q.w)&&!isWeak;
  hintUsed=false;
  const choices=makeChoices(q);
  const parts=q.ex.split('___');
  ga.innerHTML=
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">'+
      '<span class="badge b-blue">✏️ あなうめ</span>'+
      (isWeak?'<span class="badge b-coral">⚡ にがて</span>':'')+
      (isHint?'<span class="badge b-amber">💡 ヒント使った</span>':'')+
      '<span class="badge" style="background:#e8eaf6;color:#3949ab;border:1px solid #9fa8da">Lv.'+q.lv+'</span>'+
      '<span style="margin-left:auto;font-size:12px;color:#64b5f6">'+(vFillIdx+1)+'/'+vFillOrder.length+'</span>'+
    '</div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+Math.round(vFillIdx/vFillOrder.length*100)+'%"></div></div>'+
    '<div class="sentence-ctx">'+parts[0]+'<span class="blank" id="vblank">＿＿＿</span>'+(parts[1]||'')+'</div>'+
    hintBlock(q)+
    '<div class="word-choices">'+choices.map(c=>'<button class="word-chip" onclick="ansVF(\''+c+'\',\''+q.w+'\')">'+c+'</button>').join('')+'</div>'+
    '<div class="feedback" id="vffb"></div>';
}
function ansVF(chosen,correct){
  document.querySelectorAll('#v-game .word-chip').forEach(ch=>{
    if(ch.textContent===chosen)ch.classList.add(chosen===correct?'correct':'wrong');
    if(chosen!==correct&&ch.textContent===correct)ch.classList.add('correct');
    ch.classList.add('used');
  });
  document.getElementById('vblank').textContent=correct;
  const fb=document.getElementById('vffb');fb.style.display='block';
  if(!D.hintWords)D.hintWords=[];
  if(chosen===correct){
    fb.className='feedback fb-ok';const wd=W.find(w=>w.w===correct);
    fb.innerHTML='✅ 正かい！「'+correct+'」= '+(wd?wd.m:'')+(hintUsed?' 💡':'');
    D.totalCorrect++;addXP(hintUsed?2:3);D.weakWords=D.weakWords.filter(w=>w!==correct);
    if(!hintUsed)D.hintWords=D.hintWords.filter(w=>w!==correct);
    saveD();
  }else{
    fb.className='feedback fb-ng';fb.innerHTML='❌ 正かいは「'+correct+'」だよ！もう一度おぼえよう。';
    if(!D.weakWords.includes(correct))D.weakWords.push(correct);
    D.hintWords=D.hintWords.filter(w=>w!==correct);saveD();
  }
  setTimeout(()=>{vFillIdx++;renderVFill();},1800);
}
function startVMatch(){
  const ga=document.getElementById('v-game');
  const pool=shuffle(avail()).slice(0,Math.min(6,avail().length));
  const words=shuffle(pool.map(p=>p.w));
  const means=shuffle(pool.map(p=>({w:p.w,m:p.m})));
  let wp=null,mp=null,done=0;
  ga.innerHTML=
    '<div style="margin-bottom:10px"><span class="badge b-amber">🃏 いみあわせ</span></div>'+
    '<div style="font-size:13px;color:#1976d2;font-weight:500;margin-bottom:10px">えい語と日本語をペアにしよう！</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
      '<div id="mw">'+words.map(w=>'<button class="word-chip" style="width:100%;margin-bottom:6px" data-w="'+w+'" onclick="pickW(this)">'+w+'</button>').join('')+'</div>'+
      '<div id="mm">'+means.map(m=>'<button class="word-chip" style="width:100%;margin-bottom:6px" data-w="'+m.w+'" onclick="pickM(this)">'+m.m+'</button>').join('')+'</div>'+
    '</div><div class="feedback" id="mfb"></div>';
  window.pickW=function(el){
    if(el.classList.contains('correct')||el.classList.contains('used'))return;
    document.querySelectorAll('#mw .word-chip:not(.correct)').forEach(e=>{e.style.background='';e.style.borderColor='';});
    el.style.background='#e3f2fd';el.style.borderColor='#1976d2';wp=el;tryM();
  };
  window.pickM=function(el){if(el.classList.contains('correct')||el.classList.contains('used'))return;mp=el;tryM();};
  function tryM(){
    if(!wp||!mp)return;
    const fb=document.getElementById('mfb');
    if(wp.dataset.w===mp.dataset.w){
      wp.classList.add('correct');mp.classList.add('correct');
      fb.style.display='block';fb.className='feedback fb-ok';
      fb.innerHTML='✅ ペア正かい！「'+wp.textContent+'」= 「'+mp.textContent+'」';
      addXP(3);D.totalCorrect++;D.weakWords=D.weakWords.filter(w=>w!==wp.dataset.w);saveD();
      done++;if(done>=pool.length)setTimeout(()=>{fb.innerHTML+='<div style="margin-top:4px">🏆 全ペアかんりょう！</div>';addXP(5);},300);
    }else{
      wp.classList.add('wrong');mp.classList.add('wrong');
      fb.style.display='block';fb.className='feedback fb-ng';fb.innerHTML='❌ ちがうよ。もう一度！';
      if(!D.weakWords.includes(wp.dataset.w))D.weakWords.push(wp.dataset.w);saveD();
      setTimeout(()=>{wp.classList.remove('wrong');mp.classList.remove('wrong');wp.style.background='';wp.style.borderColor='';fb.style.display='none';},1000);
    }
    wp=null;mp=null;
  }
}
function startVSpell(){vSpellPool=shuffle(avail().filter(w=>w.lv<=70));vSpellIdx=0;renderVSpell();}
function renderVSpell(){
  const ga=document.getElementById('v-game');
  if(vSpellIdx>=vSpellPool.length){
    ga.innerHTML='<div style="text-align:center;padding:2rem"><div style="font-size:48px">🌟</div><div style="font-size:18px;font-weight:500;color:#1a237e;margin:8px 0">スペルマスター！</div><button class="btn btn-blue" onclick="startVSpell()">もう一度</button></div>';return;
  }
  const q=vSpellPool[vSpellIdx];
  ga.innerHTML=
    '<div style="margin-bottom:10px"><span class="badge b-purple">⌨️ スペル</span><span style="font-size:12px;color:#64b5f6;float:right">'+(vSpellIdx+1)+'/'+vSpellPool.length+'</span></div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+Math.round(vSpellIdx/vSpellPool.length*100)+'%"></div></div>'+
    '<div style="font-size:16px;font-weight:500;margin:14px 0 4px;color:#1a237e">'+q.m+'</div>'+
    '<div style="font-size:13px;color:#1976d2;font-weight:500;margin-bottom:4px">'+q.r+'</div>'+
    '<div style="font-size:12px;color:#90a4ae;margin-bottom:12px">'+q.ipa+'</div>'+
    '<div style="display:flex;gap:8px;align-items:center">'+
      '<input id="spinp" type="text" placeholder="えい語でつづりを入力..." style="flex:1" onkeydown="if(event.key===\'Enter\')checkVSp()">'+
      '<button class="btn btn-blue" onclick="checkVSp()">チェック</button>'+
    '</div><div class="feedback" id="spfb"></div>';
  setTimeout(()=>{const e=document.getElementById('spinp');if(e)e.focus();},100);
}
function checkVSp(){
  const inp=document.getElementById('spinp');
  const val=inp.value.trim().toLowerCase();
  const correct=vSpellPool[vSpellIdx].w.toLowerCase();
  const fb=document.getElementById('spfb');fb.style.display='block';
  if(val===correct){
    fb.className='feedback fb-ok';fb.innerHTML='✅ 正かい！「'+correct+'」— かんぺき！';
    inp.style.borderColor='#43a047';addXP(5);D.totalCorrect++;
    D.weakWords=D.weakWords.filter(w=>w!==vSpellPool[vSpellIdx].w);saveD();
    setTimeout(()=>{vSpellIdx++;renderVSpell();},1600);
  }else{
    fb.className='feedback fb-ng';fb.innerHTML='❌ 正かいは「'+correct+'」だよ。もう一度！';
    inp.value='';inp.style.borderColor='#e53935';
    if(!D.weakWords.includes(correct))D.weakWords.push(correct);saveD();
    setTimeout(()=>{inp.style.borderColor='#90caf9';fb.style.display='none';},1400);
  }
}

// ===== 知しき記事 =====
function renderKnowList(){
  document.getElementById('know-list').innerHTML=KA.map(a=>
    '<div class="card" style="cursor:pointer" onmouseover="this.style.borderColor=\'#42a5f5\'" onmouseout="this.style.borderColor=\'#bbdefb\'" onclick="openA(\''+a.id+'\')">'+
      '<div style="display:flex;gap:6px;margin-bottom:8px"><span class="badge '+a.badge+'">'+a.topic+'</span></div>'+
      '<div style="font-size:16px;font-weight:500;color:#1a237e">'+a.title+'</div>'+
      '<div style="font-size:13px;color:#64b5f6;margin-top:4px">タップして読む →</div>'+
    '</div>'
  ).join('');
}
function openA(id){
  const a=KA.find(x=>x.id===id);
  document.getElementById('know-list').style.display='none';
  const kv=document.getElementById('know-view');kv.style.display='block';
  let qi=0;
  kv.innerHTML=
    '<button class="btn" onclick="closeA()" style="margin-bottom:10px">← もどる</button>'+
    '<div class="card">'+
      '<div style="display:flex;gap:6px;margin-bottom:8px"><span class="badge '+a.badge+'">'+a.topic+'</span></div>'+
      '<div style="font-size:18px;font-weight:500;margin-bottom:10px;color:#1a237e">'+a.title+'</div>'+
      '<div class="article-body">'+a.body+'</div>'+
      '<div style="font-size:12px;color:#90caf9;margin-top:8px">💡 青い下線の言葉をタップすると日本語と発音記号が出るよ</div>'+
    '</div>'+
    '<div class="card" style="margin-top:8px">'+
      '<div style="font-size:15px;font-weight:500;margin-bottom:12px;color:#1a237e">❓ クイズ</div>'+
      '<div id="aq"></div>'+
    '</div>';
  function showAQ(){
    const el=document.getElementById('aq');if(!el)return;
    if(qi>=a.quiz.length){
      el.innerHTML='<div style="text-align:center;padding:1rem;background:#e8f5e9;border-radius:10px"><div style="font-size:24px;margin-bottom:4px">🏆</div><div style="font-size:15px;font-weight:500;color:#2e7d32">全問クリア！今日の記事読みかんりょう！</div></div>';
      if(!D.todaySDone){D.todaySDone=true;addXP(5);saveD();setTimeout(()=>renderDaily(),500);}return;
    }
    const q=a.quiz[qi];
    el.innerHTML=
      '<div style="font-size:12px;color:#64b5f6;margin-bottom:6px">問題 '+(qi+1)+' / '+a.quiz.length+'</div>'+
      '<div class="quiz-q">'+q.q+'</div>'+
      '<div class="quiz-opts">'+q.opts.map((o,i)=>'<button class="quiz-opt" onclick="ansAQ('+i+','+q.ans+',\''+encodeURIComponent(q.opts[q.ans])+'\')">'+o+'</button>').join('')+'</div>'+
      '<div class="feedback" id="aqfb"></div>';
  }
  window.ansAQ=function(i,ans,enc){
    const opts=document.querySelectorAll('.quiz-opt');
    if([...opts].some(o=>o.classList.contains('correct')||o.classList.contains('wrong')))return;
    opts[i].classList.add(i===ans?'correct':'wrong');if(i!==ans)opts[ans].classList.add('correct');
    const fb=document.getElementById('aqfb');fb.style.display='block';
    if(i===ans){fb.className='feedback fb-ok';fb.innerHTML='✅ 正かい！';addXP(3);D.totalCorrect++;saveD();}
    else{fb.className='feedback fb-ng';fb.innerHTML='❌ 正かいは「'+decodeURIComponent(enc)+'」だよ！';}
    setTimeout(()=>{qi++;showAQ();},1700);
  };
  showAQ();
}
function closeA(){document.getElementById('know-view').style.display='none';document.getElementById('know-list').style.display='block';}

// ===== カレンダー =====
let calYear,calMonth;
function calNav(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCal();}
function renderCal(){
  if(calYear===undefined){calYear=new Date().getFullYear();calMonth=new Date().getMonth();}
  const today=todayStr();
  document.getElementById('cal-title').textContent=calYear+'年 '+(calMonth+1)+'月';
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  let off=first.getDay()-1;if(off<0)off=6;
  let html='';
  for(let i=0;i<off;i++)html+='<div></div>';
  for(let d=1;d<=last.getDate();d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isT=ds===today,isFut=ds>today,rec=D.calendar[ds];
    let cls='cal-day';
    if(isT){cls+=' today';const td=D.todayVDone+(D.todaySDone?1:0);if(td>=D.todayVTotal+1)cls+=' done';}
    else if(isFut)cls+=' future';
    else if(rec){if(rec.done>=rec.total)cls+=' done';else if(rec.done>0)cls+=' partial';else cls+=' missed';}
    else cls+=' missed';
    html+='<div class="'+cls+'">'+d+'</div>';
  }
  document.getElementById('cal-days').innerHTML=html;
  const doneDays=Object.values(D.calendar).filter(r=>r.done>=r.total).length;
  document.getElementById('st-days').textContent=doneDays;
  document.getElementById('st-maxstreak').textContent=D.maxStreak||1;
}

// ===== たんご一覧 =====
let wlFilter='all';
function setWF(f,btn){
  wlFilter=f;
  document.querySelectorAll('#wl-filters .mode-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderWordList();
}
function renderWordList(){
  if(!D.hintWords)D.hintWords=[];
  const unlocked=avail();
  const unlockedSet=new Set(unlocked.map(w=>w.w));
  let list=W;
  if(wlFilter==='unlocked')list=W.filter(w=>unlockedSet.has(w.w));
  else if(wlFilter==='weak')list=W.filter(w=>D.weakWords.includes(w.w));
  else if(wlFilter==='hint')list=W.filter(w=>D.hintWords.includes(w.w)&&!D.weakWords.includes(w.w));

  // レベル帯ごとにまとめる
  const bands=[
    {label:'Lv.1〜20',color:'#43a047',bg:'#e8f5e9',words:list.filter(w=>w.lv<=20)},
    {label:'Lv.21〜40',color:'#1976d2',bg:'#e3f2fd',words:list.filter(w=>w.lv>20&&w.lv<=40)},
    {label:'Lv.41〜60',color:'#e65100',bg:'#fff8e1',words:list.filter(w=>w.lv>40&&w.lv<=60)},
    {label:'Lv.61〜80',color:'#6a1b9a',bg:'#f3e5f5',words:list.filter(w=>w.lv>60&&w.lv<=80)},
    {label:'Lv.81〜100',color:'#ad1457',bg:'#fce4ec',words:list.filter(w=>w.lv>80)},
  ];
  const body=document.getElementById('wl-body');
  if(!body)return;
  if(list.length===0){
    body.innerHTML='<div class="card" style="text-align:center;color:#90caf9;padding:2rem">まだたんごがありません</div>';return;
  }
  body.innerHTML=bands.filter(b=>b.words.length>0).map(b=>`
    <div class="card" style="margin-bottom:8px">
      <div style="font-size:12px;font-weight:500;color:${b.color};background:${b.bg};display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:8px">${b.label}</div>
      ${b.words.map(w=>{
        const isLocked=!unlockedSet.has(w.w);
        const isWeak=D.weakWords.includes(w.w);
        const isHint=D.hintWords.includes(w.w)&&!isWeak;
        return `<div class="wl-item${isLocked?' locked':''}">
          <div style="min-width:38px;text-align:center">
            <span style="font-size:10px;background:${b.bg};color:${b.color};border-radius:8px;padding:2px 5px;font-weight:500">${isLocked?'🔒':('Lv'+w.lv)}</span>
          </div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span class="wl-en">${w.w}</span>
              ${isWeak?'<span style="font-size:11px;background:#fce4ec;color:#ad1457;padding:1px 7px;border-radius:10px">⚡ にがて</span>':''}
              ${isHint?'<span style="font-size:11px;background:#fff8e1;color:#e65100;padding:1px 7px;border-radius:10px">💡 ヒント</span>':''}
            </div>
            <span class="wl-ipa">${w.ipa}</span>
          </div>
          <div style="text-align:right">
            <div class="wl-jp">${w.m}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

// ===== ナビゲーション =====
function showSec(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');if(btn)btn.classList.add('active');
  if(id==='calsec')renderCal();
  if(id==='wordlist')renderWordList();
  if(id==='vocab'){document.getElementById('v-info').textContent='使えるたんご: '+avail().length+'語 / 50語（Lv.'+D.level+'）';}
}
